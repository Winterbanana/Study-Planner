{% extends 'base.html' %}

{% block content %}
<section class="panel form-panel">
  <h1>Edit Course</h1>
  <p>Customize your course details, grouping, and priority.</p>

  <form method="POST" class="stack-form">
    <div class="two-col">
      <div>
        <label for="course_name">Course Name</label>
        <input id="course_name" type="text" name="course_name" value="{{ course.name }}" required>
      </div>
      <div>
        <label for="course_priority">Priority</label>
        <select id="course_priority" name="course_priority" required>
          <option value="Low" {% if course.priority == 'Low' %}selected{% endif %}>Low Priority</option>
          <option value="Medium" {% if course.priority == 'Medium' %}selected{% endif %}>Medium Priority</option>
          <option value="High" {% if course.priority == 'High' %}selected{% endif %}>High Priority</option>
        </select>
      </div>
    </div>

    <div class="two-col">
      <div>
        <label for="course_code">Course Code</label>
        <input id="course_code" type="text" name="course_code" value="{{ course.course_code or '' }}">
      </div>
      <div>
        <label for="instructor_name">Instructor</label>
        <input id="instructor_name" type="text" name="instructor_name" value="{{ course.instructor_name or '' }}">
      </div>
    </div>

    <div class="two-col">
      <div>
        <label for="grouping_id">Grouping</label>
        <select id="grouping_id" name="grouping_id">
          <option value="">No grouping</option>
          {% for grouping in groupings %}
            <option value="{{ grouping.id }}" {% if course.grouping_id == grouping.id %}selected{% endif %}>{{ grouping.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="accent_color">Card Accent Color</label>
        <div class="color-choice-inline">
          <span class="color-choice-text">Choose</span>
          <input id="accent_color" class="color-picker-input" type="color" name="accent_color" value="{{ course.accent_color or '#2d8f6f' }}">
        </div>
      </div>
    </div>

    <label for="course_description">Description</label>
    <textarea id="course_description" name="course_description" rows="3">{{ course.description or '' }}</textarea>

    <button type="submit" class="btn btn-primary">Save Course</button>
    <a class="btn" href="/dashboard#courses">Cancel</a>
  </form>

  {% if error %}
    <p class="error-text">{{ error }}</p>
  {% endif %}
</section>
{% endblock %}
