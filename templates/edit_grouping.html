{% extends 'base.html' %}

{% block content %}
<section class="panel form-panel">
  <h1>Edit Grouping</h1>
  <p>Update grouping name, priority, color, and note.</p>

  <form method="POST" class="stack-form">
    <label for="grouping_name">Grouping Name</label>
    <input id="grouping_name" type="text" name="grouping_name" value="{{ grouping.name }}" required>

    <div class="two-col">
      <div>
        <label for="grouping_priority">Priority</label>
        <select id="grouping_priority" name="grouping_priority" required>
          <option value="Low" {% if grouping.priority == 'Low' %}selected{% endif %}>Low Priority</option>
          <option value="Medium" {% if grouping.priority == 'Medium' %}selected{% endif %}>Medium Priority</option>
          <option value="High" {% if grouping.priority == 'High' %}selected{% endif %}>High Priority</option>
        </select>
      </div>
      <div>
        <label for="grouping_color">Color</label>
        <div class="color-choice-inline">
          <span class="color-choice-text">Choose</span>
          <input id="grouping_color" class="color-picker-input" type="color" name="grouping_color" value="{{ grouping.color or '#2d8f6f' }}">
        </div>
      </div>
    </div>

    <label for="grouping_note">Note (Optional)</label>
    <input id="grouping_note" type="text" name="grouping_note" value="{{ grouping.note or '' }}">

    <button type="submit" class="btn btn-primary">Save Grouping</button>
    <a class="btn" href="/dashboard#groupings">Cancel</a>
  </form>

  {% if error %}
    <p class="error-text">{{ error }}</p>
  {% endif %}
</section>
{% endblock %}
